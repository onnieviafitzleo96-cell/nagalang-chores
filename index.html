<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <title>Nagalang Chores</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🏠 Nagalang Chores</h1>
        <p>Keeping the house fair, one shuffle at a time.</p>

        <div id="chore-board">
            <div class="chore-card">
                <input type="checkbox" id="sample-chore">
                <label for="sample-chore">
                    <strong>Kitchen Cleaning</strong> <br>
                    <span>Assigned to: Loading...</span>
                </label>
            </div>
        </div>

        <button class="shuffle-btn">Shuffle New Chores</button>
    </div>

</body>
</html>
